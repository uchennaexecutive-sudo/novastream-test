<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVA STREAM</title>
    <!-- Poppins & JetBrains Mono are bundled via @fontsource packages -->
    <!-- Righteous (display font) loaded non-blocking so it never causes white screen -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" /></noscript>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #050508;
        color: #f0f0ff;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(122, 92, 255, 0.16), transparent 42%),
          linear-gradient(180deg, #090910 0%, #050508 100%);
        opacity: 1;
        transition: opacity 180ms ease;
      }

      #boot-splash.boot-splash--hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-splash__panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 28px 32px;
        border-radius: 24px;
        background: rgba(14, 14, 20, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 18px 60px rgba(0, 0, 0, 0.35),
          0 0 30px rgba(122, 92, 255, 0.14);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .boot-splash__mark {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 2px solid rgba(122, 92, 255, 0.22);
        border-top-color: #7a5cff;
        animation: boot-spin 0.85s linear infinite;
      }

      .boot-splash__title {
        font-family: 'Righteous', sans-serif;
        font-size: 22px;
        letter-spacing: 0.08em;
      }

      .boot-splash__subtitle {
        font-family: 'Poppins', sans-serif;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(240, 240, 255, 0.68);
      }

      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash__panel">
        <div class="boot-splash__mark"></div>
        <div class="boot-splash__title">NOVA STREAM</div>
        <div class="boot-splash__subtitle">Preparing your library</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
