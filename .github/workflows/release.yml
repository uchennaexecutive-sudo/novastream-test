name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  # Public Watch Party transport config used by packaged builds.
  # Token minting stays on the Vercel service, so no LiveKit secret is embedded.
  VITE_WATCH_PARTY_LIVEKIT_URL: wss://nova-stream-7u1ceh13.livekit.cloud
  VITE_WATCH_PARTY_TOKEN_ENDPOINT: https://novastream-watch-party-token-servic.vercel.app/api/watch-party-token

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install vendored Nuvio sidecar dependencies
        working-directory: vendor/nuvio-streams-addon
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Build Tauri app
        run: npx tauri build

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find portable exe
        id: artifacts
        shell: powershell
        run: |
          Write-Host "=== Looking for portable exe ==="
          $releaseExe = Get-ChildItem -Path "src-tauri/target/release" -Filter "nova-stream.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($releaseExe) {
            $exePath = $releaseExe.FullName.Replace('\', '/')
            Write-Host "Found portable exe: $exePath"
            "PORTABLE_EXE=$exePath" >> $env:GITHUB_OUTPUT
            "PORTABLE_NAME=NOVA-STREAM-${{ steps.version.outputs.VERSION }}-portable.exe" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ERROR: No portable exe found! Listing all exes:"
            Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Rename portable exe
        shell: powershell
        run: |
          Copy-Item "${{ steps.artifacts.outputs.PORTABLE_EXE }}" "${{ steps.artifacts.outputs.PORTABLE_NAME }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NOVA STREAM v${{ steps.version.outputs.VERSION }}"
          body: |
            ## NOVA STREAM v${{ steps.version.outputs.VERSION }}

            Download the portable exe below - no installation needed.
          files: |
            ${{ steps.artifacts.outputs.PORTABLE_NAME }}
          draft: false
          prerelease: false

      - name: Commit updated latest.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          
          VERSION="${{ steps.version.outputs.VERSION }}"
          PORTABLE_NAME="${{ steps.artifacts.outputs.PORTABLE_NAME }}"
          MACOS_NAME="NOVA-STREAM-$VERSION-macos.dmg"

          cat > updates/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "v$VERSION - Auto-release",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$PORTABLE_NAME"
              },
              "darwin-universal": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$MACOS_NAME"
              }
            }
          }
          EOF

          git add updates/latest.json
          git commit -m "chore: update latest.json for v${{ steps.version.outputs.VERSION }}" || true
          git push origin main

  build-macos:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install vendored Nuvio sidecar dependencies
        working-directory: vendor/nuvio-streams-addon
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Add macOS targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Download embedded macOS Node runtimes
        shell: bash
        run: |
          NODE_RUNTIME_VERSION="20.20.2"
          NODE_RUNTIME_DIR="$RUNNER_TEMP/nova-stream-node-runtimes"

          mkdir -p "$NODE_RUNTIME_DIR"

          curl -fsSL "https://nodejs.org/download/release/v${NODE_RUNTIME_VERSION}/node-v${NODE_RUNTIME_VERSION}-darwin-x64.tar.gz" \
            -o "$NODE_RUNTIME_DIR/node-darwin-x64.tar.gz"
          curl -fsSL "https://nodejs.org/download/release/v${NODE_RUNTIME_VERSION}/node-v${NODE_RUNTIME_VERSION}-darwin-arm64.tar.gz" \
            -o "$NODE_RUNTIME_DIR/node-darwin-arm64.tar.gz"

          tar -xzf "$NODE_RUNTIME_DIR/node-darwin-x64.tar.gz" -C "$NODE_RUNTIME_DIR"
          tar -xzf "$NODE_RUNTIME_DIR/node-darwin-arm64.tar.gz" -C "$NODE_RUNTIME_DIR"

          echo "NOVA_STREAM_NODE_BINARY_MACOS_X64=$NODE_RUNTIME_DIR/node-v${NODE_RUNTIME_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"
          echo "NOVA_STREAM_NODE_BINARY_MACOS_ARM64=$NODE_RUNTIME_DIR/node-v${NODE_RUNTIME_VERSION}-darwin-arm64/bin/node" >> "$GITHUB_ENV"

      - name: Build Tauri app (macOS universal bundle)
        run: npx tauri build --target universal-apple-darwin --bundles app

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find Mac app bundle
        id: artifacts
        shell: bash
        run: |
          echo "=== Looking for macOS app bundle ==="

          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle -name "*.app" -type d | head -n 1)

          if [ -n "$APP_PATH" ]; then
            echo "Found app bundle: $APP_PATH"
            echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
            echo "ARTIFACT_NAME=NOVA-STREAM-${{ steps.version.outputs.VERSION }}-macos.dmg" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "ERROR: No macOS app bundle found"
          find src-tauri/target/release/bundle -type f
          exit 1

      - name: Package Mac DMG Artifact
        id: package_artifact
        shell: bash
        run: |
          ARTIFACT_NAME="${{ steps.artifacts.outputs.ARTIFACT_NAME }}"
          APP_PATH="${{ steps.artifacts.outputs.APP_PATH }}"
          APP_NAME="$(basename "$APP_PATH")"
          INSTALLER_APP_NAME="NOVA STREAM Installer.app"
          STAGING_DIR="$(mktemp -d)"

          ditto "$APP_PATH" "$STAGING_DIR/$APP_NAME"
          ditto "release/macos/$INSTALLER_APP_NAME" "$STAGING_DIR/$INSTALLER_APP_NAME"
          chmod +x "$STAGING_DIR/$INSTALLER_APP_NAME/Contents/MacOS/install-helper"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "NOVA STREAM" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$ARTIFACT_NAME"

          rm -rf "$STAGING_DIR"
          echo "UPLOAD_NAME=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Upload Mac DMG artifact to existing GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "v${{ steps.version.outputs.VERSION }}" "${{ steps.package_artifact.outputs.UPLOAD_NAME }}" --clobber

      - name: Refresh latest.json with macOS artifact
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main

          VERSION="${{ steps.version.outputs.VERSION }}"
          PORTABLE_NAME="NOVA-STREAM-$VERSION-portable.exe"
          MACOS_NAME="${{ steps.package_artifact.outputs.UPLOAD_NAME }}"

          cat > updates/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "v$VERSION - Auto-release",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$PORTABLE_NAME"
              },
              "darwin-universal": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$MACOS_NAME"
              }
            }
          }
          EOF

          git add updates/latest.json
          git commit -m "chore: refresh latest.json for v${{ steps.version.outputs.VERSION }}" || true
          git push origin main
